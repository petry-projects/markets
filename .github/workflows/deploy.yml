name: Deploy API

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'dev'
        type: choice
        options: [dev, staging, production]
  push:
    branches: [main]
    paths:
      - 'markets-api/**'
      - 'infra/**'
      - '.github/workflows/deploy.yml'

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'dev' }}
  cancel-in-progress: false

env:
  REGION: us-central1
  PROJECT_ID: markets-491920
  REGISTRY: us-central1-docker.pkg.dev/markets-491920/markets
  SERVICE_NAME: markets-api-dev

jobs:
  infra:
    name: Apply Infrastructure
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.5"

      - name: Terraform Init
        working-directory: infra
        run: terraform init -backend-config=environments/${{ github.event.inputs.environment || 'dev' }}/backend.hcl

      - name: Terraform Apply
        working-directory: infra
        env:
          TF_VAR_db_password: ${{ secrets.DB_PASSWORD }}
          TF_VAR_api_image: ${{ needs.build-push.outputs.image }}
          TF_VAR_google_oauth_client_id: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          TF_VAR_google_oauth_client_secret: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          TF_VAR_apple_oauth_client_id: ${{ secrets.APPLE_OAUTH_CLIENT_ID }}
          TF_VAR_apple_oauth_client_secret: ${{ secrets.APPLE_OAUTH_CLIENT_SECRET }}
          TF_VAR_facebook_oauth_app_id: ${{ secrets.FACEBOOK_OAUTH_APP_ID }}
          TF_VAR_facebook_oauth_app_secret: ${{ secrets.FACEBOOK_OAUTH_APP_SECRET }}
        run: |
          terraform plan \
            -var-file=environments/${{ github.event.inputs.environment || 'dev' }}/terraform.tfvars \
            -out=tfplan
          terraform apply -auto-approve tfplan

  build-push:
    name: Build & Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Build and push
        id: meta
        run: |
          IMAGE="${{ env.REGISTRY }}/api:${{ github.sha }}"
          docker build -t "$IMAGE" -t "${{ env.REGISTRY }}/api:latest" markets-api/
          docker push "$IMAGE"
          docker push "${{ env.REGISTRY }}/api:latest"
          echo "image=$IMAGE" >> "$GITHUB_OUTPUT"

  migrate:
    name: Run Migrations
    needs: build-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Install Cloud SQL Proxy
        run: |
          curl -o cloud-sql-proxy https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.3/cloud-sql-proxy.linux.amd64
          chmod +x cloud-sql-proxy

      - name: Run migrations
        env:
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          INSTANCE_CONNECTION: ${{ secrets.CLOUD_SQL_CONNECTION_NAME }}
        run: |
          ./cloud-sql-proxy --port 5432 "$INSTANCE_CONNECTION" &
          sleep 5
          docker run --network host \
            -v "${{ github.workspace }}/markets-api/migrations:/migrations" \
            migrate/migrate:v4.17.0 \
            -path=/migrations \
            -database "postgres://markets:${DB_PASSWORD}@localhost:5432/markets_dev?sslmode=disable" \
            up

  deploy:
    name: Deploy to Cloud Run
    needs: [infra, build-push, migrate]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          image: ${{ needs.build-push.outputs.image }}
          region: ${{ env.REGION }}

      - name: Verify deployment
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.REGION }} \
            --format 'value(status.url)')
          echo "Deployed to: $URL"
          STATUS=$(curl -sf "${URL}/health" | jq -r '.status')
          if [ "$STATUS" != "ok" ]; then
            echo "Health check failed!"
            exit 1
          fi
          echo "Health check passed: $URL/health -> ok"
