name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'markets-api/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'markets-api/**'
      - '.github/workflows/backend-ci.yml'

concurrency:
  group: backend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: markets-api

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: markets-api/go.mod
          cache-dependency-path: markets-api/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          install-mode: goinstall
          working-directory: markets-api

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: markets-api/go.mod
          cache-dependency-path: markets-api/go.sum

      - name: Run unit tests with race detector
        run: |
          go test $(go list ./... | grep -v /generated | grep -v /integration) \
            -short -count=1 -race -coverprofile=coverage.out

      - name: Run integration tests
        if: false  # Skipped until CI database service is configured
        run: go test ./internal/integration/ -count=1 -race -v

      - name: Enforce coverage threshold
        run: |
          # Exclude generated code from coverage calculation
          grep -v 'internal/graph/generated/' coverage.out > coverage-filtered.out || true
          grep -v 'models_gen.go' coverage-filtered.out > coverage-clean.out || true
          COVERAGE=$(go tool cover -func=coverage-clean.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage (excluding generated): ${COVERAGE}%"
          # Use higher threshold on main, lower on feature branches
          if [ "$GITHUB_BASE_REF" = "main" ] || [ "$GITHUB_REF" = "refs/heads/main" ]; then
            THRESHOLD=60
          else
            THRESHOLD=15
          fi
          echo "Threshold: ${THRESHOLD}% (base: ${GITHUB_BASE_REF:-push})"
          if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

      - name: Test summary
        if: always()
        run: |
          echo "## Backend CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f coverage-clean.out ]; then
            COVERAGE=$(go tool cover -func=coverage-clean.out | grep total | awk '{print $3}')
            echo "- **Coverage**: ${COVERAGE} (excluding generated)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- **Race detector**: ✅ enabled" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: markets-api/coverage-clean.out
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: markets-api/go.mod
          cache-dependency-path: markets-api/go.sum

      - name: Build
        run: |
          if [ -d cmd/api ]; then
            go build ./cmd/api/
          else
            go build ./...
          fi

  schema-validate:
    name: Schema Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: markets-api/go.mod
          cache-dependency-path: markets-api/go.sum

      - name: Validate GraphQL schema
        run: go run github.com/99designs/gqlgen validate
