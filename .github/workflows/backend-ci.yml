name: Backend CI

on:
  push:
    branches: [main]
    paths:
      - 'markets-api/**'
  pull_request:
    branches: [main]
    paths:
      - 'markets-api/**'

defaults:
  run:
    working-directory: markets-api

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: markets-api/go.sum

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: markets-api

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: markets-api/go.sum

      - name: Run tests with race detector
        run: |
          go test $(go list ./... | grep -v /generated) \
            -short -count=1 -race -coverprofile=coverage.out

      - name: Enforce coverage threshold
        run: |
          # Exclude generated code from coverage calculation
          grep -v 'internal/graph/generated/' coverage.out > coverage-filtered.out || true
          grep -v 'models_gen.go' coverage-filtered.out > coverage-clean.out || true
          COVERAGE=$(go tool cover -func=coverage-clean.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total coverage (excluding generated): ${COVERAGE}%"
          THRESHOLD=60
          if [ "$(echo "$COVERAGE < $THRESHOLD" | bc -l)" -eq 1 ]; then
            echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
            exit 1
          fi

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: markets-api/coverage-clean.out
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: markets-api/go.sum

      - name: Build
        run: go build ./cmd/api/

  schema-validate:
    name: Schema Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache-dependency-path: markets-api/go.sum

      - name: Validate GraphQL schema
        run: go run github.com/99designs/gqlgen validate
