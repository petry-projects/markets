name: Frontend CI

on:
  pull_request:
    paths:
      - 'markets-app/**'
  push:
    branches: [main]
    paths:
      - 'markets-app/**'

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: markets-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: markets-app/package-lock.json
      - run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Lint
        run: npx eslint . --max-warnings 0
      - name: Format check
        run: npx prettier --check .
      - name: Unit + component tests
        run: npx jest --ci --coverage --coverageReporters=text --coverageReporters=json-summary
      - name: Enforce coverage threshold
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(node -e "const s = require('./coverage/coverage-summary.json'); console.log(s.total.statements.pct)")
            echo "Statement coverage: ${COVERAGE}%"
            THRESHOLD=60
            BELOW=$(node -e "console.log($COVERAGE < $THRESHOLD ? 1 : 0)")
            if [ "$BELOW" = "1" ]; then
              echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
              exit 1
            fi
          fi
      - name: Codegen check
        run: npm run codegen:check
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: markets-app/coverage/
          retention-days: 14
