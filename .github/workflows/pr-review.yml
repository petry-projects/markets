# ─────────────────────────────────────────────────────────────────────────────
# SOURCE OF TRUTH: petry-projects/.github-private/.github/workflows/pr-review-trigger.yml
#
# AGENTS — READ BEFORE EDITING:
#   • This file is a THIN TRIGGER STUB. All review logic lives in the reusable
#     `pr-review.yml` in petry-projects/.github-private.
#   • You MAY change: the SHA in the `uses:` line when promoting a new stable
#     release (update to the SHA of the new pr-review/stable tag).
#   • You MUST NOT change: the `permissions:` block — reusable workflows can be
#     granted no more permissions than the calling job, so the stanza must mirror
#     the reusable's own permissions declaration.
#   • The `pr-review-mention.yml` workflow handles @mention triggers
#     (issue_comment, pull_request_review_comment). Do not add those here.
# ─────────────────────────────────────────────────────────────────────────────

name: PR Review Agent

# Thin caller for the org PR Review agent (petry-projects/.github-private),
# pinned to the known-good `pr-review/stable` channel. Adopted from the validated
# `.github-private/pr-review-trigger.yml` template (#536 consumer fan-out).
#
# - Version selection is the moving `pr-review/stable` tag — this file never
#   changes on promotion; a release is rolled out by moving the tag centrally.
# - `agent_ref: pr-review/stable` pins the agent's own scripts to the same
#   channel (#506), so the review logic AND scripts run the known-good version.
# - `secrets: inherit` forwards the org secrets, including
#   `DON_PETRY_BOT_GH_PAT_CLASSIC` (classic PAT — required for approvals, since
#   fine-grained PATs cannot `addPullRequestReview`).

on:
  check_suite:
    types: [completed]
  pull_request_review:
    types: [submitted, dismissed]
  pull_request:
    types: [opened, ready_for_review, reopened, synchronize]
  workflow_dispatch:
    inputs:
      pr_url:
        description: "Optional: review a single PR URL instead of enumerating"
        required: false
        type: string
      dry_run:
        description: "If true, never submit reviews or comments"
        required: false
        default: "false"
        type: string
      force_review:
        description: "If true, bypass idempotency and re-review at the same head SHA"
        required: false
        default: "false"
        type: string
  repository_dispatch:
    # Triggered by the petry-projects/.github mention-listener (via
    # pr-review-mention.yml). Payload: { pr_url, force_review }.
    types: [pr-review-mention]

# Granted to the called reusable's job (a reusable can be granted no more than
# the calling job has). Mirrors pr-review.yml's own permissions block.
permissions:
  contents: read
  pull-requests: write
  checks: read

concurrency:
  group: >-
    ${{
      (github.event.pull_request.number
       || github.event.check_suite.pull_requests[0].number
       || inputs.pr_url
       || github.event.client_payload.pr_url)
      && format('pr-review-pr-{0}',
           github.event.pull_request.number
           || github.event.check_suite.pull_requests[0].number
           || inputs.pr_url
           || github.event.client_payload.pr_url)
      || 'pr-review-batch'
    }}
  cancel-in-progress: true

jobs:
  pr-review:
    if: >-
      ${{
        github.event_name != 'check_suite' ||
        github.event.check_suite.pull_requests[0] != null
      }}
    uses: petry-projects/.github-private/.github/workflows/pr-review.yml@1bd8975a9c83bca376082f0b507c89b3743d5e3f # pr-review/stable
    with:
      # Pin the agent's own script checkout to the main branch of this repo,
      # which is the stable channel for markets (pr-review/stable does not exist).
      agent_ref: main
      # Forward manual/dispatch inputs; empty for event triggers (the reusable
      # then derives everything from the inherited github.event context).
      pr_url: ${{ inputs.pr_url || '' }}
      dry_run: ${{ inputs.dry_run || '' }}
      force_review: ${{ inputs.force_review || '' }}
    secrets: inherit
