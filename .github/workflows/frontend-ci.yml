name: Frontend CI

on:
  pull_request:
    paths:
      - 'markets-app/**'
      - '.github/workflows/frontend-ci.yml'
  push:
    branches: [main]
    paths:
      - 'markets-app/**'

concurrency:
  group: frontend-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: markets-app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: markets-app/package-lock.json
      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint . --max-warnings 0

      - name: Format check
        run: npx prettier --check .

      - name: Unit + component tests
        run: npx jest --ci --coverage --coverageReporters=text --coverageReporters=json-summary

      - name: Enforce coverage threshold
        run: |
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(node -e "const s = require('./coverage/coverage-summary.json'); console.log(s.total.statements.pct)")
            echo "Statement coverage: ${COVERAGE}%"
            # Use higher threshold on main, lower on feature branches
            if [ "$GITHUB_BASE_REF" = "main" ] || [ "$GITHUB_REF" = "refs/heads/main" ]; then
              THRESHOLD=60
            else
              THRESHOLD=20
            fi
            echo "Threshold: ${THRESHOLD}% (base: ${GITHUB_BASE_REF:-push})"
            BELOW=$(node -e "console.log($COVERAGE < $THRESHOLD ? 1 : 0)")
            if [ "$BELOW" = "1" ]; then
              echo "::error::Coverage ${COVERAGE}% is below threshold ${THRESHOLD}%"
              exit 1
            fi
          fi

      - name: Codegen check
        run: npm run codegen:check

      - name: Expo export smoke test
        run: npx expo export --platform web --output-dir /tmp/expo-export 2>&1 | tail -5

      - name: Test summary
        if: always()
        run: |
          echo "## Frontend CI Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          if [ -f coverage/coverage-summary.json ]; then
            COVERAGE=$(node -e "const s = require('./coverage/coverage-summary.json'); console.log(s.total.statements.pct)")
            echo "- **Coverage**: ${COVERAGE}% statements" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- **TypeScript**: ✅ passed" >> "$GITHUB_STEP_SUMMARY"
          echo "- **ESLint**: ✅ passed" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Prettier**: ✅ passed" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: markets-app/coverage/
          retention-days: 14
