# SOURCE OF TRUTH: petry-projects/.github/standards/workflows/pr-review-mention.yml
# Standard:        petry-projects/.github/standards/ci-standards.md
# Reusable:        petry-projects/.github/.github/workflows/pr-review-mention-reusable.yml
#
# AGENTS — READ BEFORE EDITING:
#   • This file is a THIN CALLER STUB. All review-dispatch logic lives in the
#     reusable workflow above.
#   • You MUST NOT change: the `uses:` ref — it is pinned to the
#     `pr-review-mention/stable` channel, a moving tag advanced centrally.
#     Never repoint it to `@main`, a SHA, or a frozen `@vX` (see
#     ci-standards.md → Reusable workflow versioning). Also do not change the
#     trigger events, the explicit `secrets:` mapping (GH_PAT_WORKFLOWS and
#     DON_PETRY_BOT_GH_PAT are both required by the reusable), or the job-level
#     `permissions:` block — reusable workflows can be granted no more
#     permissions than the calling job, so removing the stanza breaks the
#     reusable's gh API calls.
#   • If you need different behaviour, open a PR against the reusable in the
#     central repo. A new release is rolled out by moving the channel tag
#     centrally — never by editing callers, so no fanout PR is needed.
# ─────────────────────────────────────────────────────────────────────────────
#
# PR Review Mention — thin caller for the org-level reusable.
# To adopt: copy this file to .github/workflows/pr-review-mention.yml in your repo.
# Requires: GH_PAT_WORKFLOWS and DON_PETRY_BOT_GH_PAT org secrets (already
# present in petry-projects org).
name: PR Review — Mention Trigger

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [review_requested]

permissions: {}

jobs:
  pr-review-mention:
    # Skip events whose sender is a Bot (e.g. the Copilot coding agent), marking
    # the job skipped (= success) and preventing an unnecessary reusable workflow
    # invocation. The mention / review-request flow is human-driven, so a bot
    # sender never carries a legitimate review request.
    # Limitation: this job-level guard cannot prevent a workflow-level
    # `action_required` state — GitHub enforces that approval gate before any
    # `if:` condition is evaluated (see issue #307 for context). For bots that
    # trigger the repo's first-time-contributor approval requirement the proper
    # mitigation is to allowlist the bot account in Settings → Actions →
    # "Fork pull request workflows from outside collaborators".
    # `github.event.sender` is populated on all three trigger events.
    if: github.event.sender.type != 'Bot'
    permissions:
      pull-requests: write
    uses: petry-projects/.github/.github/workflows/pr-review-mention-reusable.yml@pr-review-mention/stable  # NOSONAR(githubactions:S7637) first-party channel ref
    # Pass only the secrets the reusable declares (S7635), not every org secret.
    secrets:
      GH_PAT_WORKFLOWS: ${{ secrets.GH_PAT_WORKFLOWS }}
      DON_PETRY_BOT_GH_PAT: ${{ secrets.DON_PETRY_BOT_GH_PAT }}