name: PR Auto-Review — Ready Check

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
  check_suite:
    types: [completed]
  pull_request_review:
    types: [submitted, dismissed]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions: {}

jobs:
  pr-auto-review:
    permissions:
      pull-requests: read
      checks: read
      actions: read
    uses: petry-projects/.github/.github/workflows/pr-auto-review-reusable.yml@376a4fcb1117444595e3e702fa450873d0e54310
    secrets:
      GH_PAT_WORKFLOWS: ${{ secrets.GH_PAT_WORKFLOWS }}
