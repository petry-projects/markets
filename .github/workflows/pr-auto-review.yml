name: PR Auto-Review — Ready Check

on:
  workflow_run:
    workflows: ["CI", "AgentShield", "Dependency audit", "SonarCloud Analysis"]
    types: [completed]
  pull_request_review:
    types: [dismissed]
  pull_request_review_thread:
    types: [resolved]
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]

permissions: {}

jobs:
  pr-auto-review:
    if: >-
      github.event_name == 'workflow_run' ||
      github.event.pull_request.head.repo.full_name == github.repository
    permissions:
      pull-requests: read
      checks: read
      actions: read
    uses: petry-projects/.github/.github/workflows/pr-auto-review-reusable.yml@376a4fcb1117444595e3e702fa450873d0e54310
    secrets:
      GH_PAT_WORKFLOWS: ${{ secrets.GH_PAT_WORKFLOWS }}
