query DiscoverMarkets(
  $latitude: Float!
  $longitude: Float!
  $radiusMiles: Float!
  $limit: Int
  $offset: Int
) {
  discoverMarkets(
    latitude: $latitude
    longitude: $longitude
    radiusMiles: $radiusMiles
    limit: $limit
    offset: $offset
  ) {
    id
    name
    description
    address
    latitude
    longitude
    imageURL
    status
  }
}
