name: PR Review Agent

# Thin caller for the org PR Review agent (petry-projects/.github-private),
# pinned to the known-good `pr-review/stable` channel. Adopted from the validated
# `.github-private/pr-review-trigger.yml` template (#536 consumer fan-out).
#
# - Version selection is the moving `pr-review/stable` tag — this file never
#   changes on promotion; a release is rolled out by moving the tag centrally.
# - `agent_ref: pr-review/stable` pins the agent's own scripts to the same
#   channel (#506), so the review logic AND scripts run the known-good version.
# - `secrets: inherit` forwards the org secrets, including
#   `DON_PETRY_BOT_GH_PAT_CLASSIC` (classic PAT — required for approvals, since
#   fine-grained PATs cannot `addPullRequestReview`).

on:
  check_suite:
    types: [completed]
  pull_request_review:
    types: [submitted, dismissed]
  pull_request:
    types: [ready_for_review, reopened, synchronize]
  workflow_dispatch:
    inputs:
      pr_url:
        description: "Optional: review a single PR URL instead of enumerating"
        required: false
        type: string
      dry_run:
        description: "If true, never submit reviews or comments"
        required: false
        default: "false"
        type: string
      force_review:
        description: "If true, bypass idempotency and re-review at the same head SHA"
        required: false
        default: "false"
        type: string
  repository_dispatch:
    types: [pr-review-mention]

permissions:
  contents: read
  pull-requests: write
  checks: read

# Collapse redundant overlapping runs for the same PR. The high-frequency
# triggers (synchronize + the resulting check_suite completions) fire several
# times for one PR head; without this they spawn concurrent duplicate reviews
# (the source of the cancelled runs). Group per PR when one is identifiable;
# fall back to a unique run id for batch/dispatch/no-PR runs so those are never
# cancelled against each other.
concurrency:
  group: >-
    pr-review-${{
      github.event.pull_request.number
      || github.event.check_suite.pull_requests[0].number
      || inputs.pr_url
      || github.event.client_payload.pr_url
      || github.run_id
    }}
  cancel-in-progress: true

jobs:
  review:
    # Skip check_suite completions with no associated PR (e.g. pushes to main):
    # there is nothing to review, so the run would be pure waste.
    if: >-
      github.event_name != 'check_suite'
      || github.event.check_suite.pull_requests[0] != null
    uses: petry-projects/.github-private/.github/workflows/pr-review.yml@pr-review/stable  # NOSONAR(githubactions:S7637) first-party channel ref
    with:
      agent_ref: pr-review/stable
      pr_url: ${{ inputs.pr_url || '' }}
      dry_run: ${{ inputs.dry_run || '' }}
      force_review: ${{ inputs.force_review || '' }}
    secrets: inherit  # NOSONAR(githubactions:S7635) first-party trusted reusable