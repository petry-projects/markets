query GetMarket($id: ID!) {
  market(id: $id) {
    id
    name
    description
    address
    latitude
    longitude
    contactEmail
    contactPhone
    socialLinks {
      instagram
      facebook
      website
      twitter
    }
    imageURL
    rulesText
    rulesUpdatedAt
    status
    schedule {
      id
      scheduleType
      dayOfWeek
      startTime
      endTime
      seasonStart
      seasonEnd
      eventName
      eventDate
      label
    }
    createdAt
    updatedAt
  }
}
