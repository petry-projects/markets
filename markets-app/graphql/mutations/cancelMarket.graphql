mutation CancelMarket(
  $marketID: ID!
  $reason: CancellationReason!
  $message: String
  $endEarly: Boolean
) {
  cancelMarket(marketID: $marketID, reason: $reason, message: $message, endEarly: $endEarly) {
    id
    status
    cancellationReason
    cancellationMessage
    cancelledAt
    updatedAt
  }
}
