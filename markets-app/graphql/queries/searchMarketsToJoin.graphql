query SearchMarketsToJoin($input: SearchMarketsInput!) {
  searchMarketsToJoin(input: $input) {
    market {
      id
      name
      description
      address
      latitude
      longitude
      contactEmail
      contactPhone
      rulesText
      rulesUpdatedAt
      status
      schedule {
        id
        scheduleType
        dayOfWeek
        startTime
        endTime
        seasonStart
        seasonEnd
        eventName
        eventDate
        label
      }
    }
    distanceKm
    vendorCount
    vendorStatus
  }
}
