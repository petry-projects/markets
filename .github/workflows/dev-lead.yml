# ─────────────────────────────────────────────────────────────────────────────
# Dev-Lead Agent — thin caller stub
# Standard:  petry-projects/.github/standards/ci-standards.md#5-dev-lead-agent
# Reusable:  petry-projects/.github-private/.github/workflows/dev-lead-reusable.yml
#
# ADOPTING THIS WORKFLOW:
#   1. Copy this file verbatim to .github/workflows/dev-lead.yml in your repo.
#   2. Ensure CLAUDE_CODE_OAUTH_TOKEN is set as an org or repo secret.
#   3. Optionally set GH_PAT_WORKFLOWS (required if Claude pushes workflow files).
#   4. Optionally set vars.DEV_LEAD_ENGINE = "claude" | "gemini" | "copilot".
#
# UNLIKE claude.yml, this file has NO OIDC byte-for-byte constraint and may be
# freely modified on PR branches to adjust triggers for repo-specific needs.
#
# REQUIRED secrets: CLAUDE_CODE_OAUTH_TOKEN
# OPTIONAL secrets: GH_PAT_WORKFLOWS, GOOGLE_API_KEY, GH_PAT
# ─────────────────────────────────────────────────────────────────────────────

name: Dev-Lead Agent

on:
  pull_request:
    branches: [main]
    types: [opened, reopened, synchronize]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]
  issue_comment:
    types: [created]
  issues:
    types: [labeled]
  check_run:
    types: [completed]
  repository_dispatch:
    types: [dev-lead-ci-failure]

permissions: {}

concurrency:
  # Scoped per PR or issue so parallel PRs/issues run concurrently instead of
  # queuing behind a single global slot (which caused >50% cancellations).
  # ci-relay (check_run) keeps an ephemeral per-SHA slot so it fires immediately
  # without blocking or being blocked by the per-PR/issue queue.
  group: >-
    ${{
      github.event_name == 'check_run'                   && format('dev-lead-ci-relay-{0}', github.event.check_run.head_sha) ||
      github.event_name == 'pull_request'                && format('dev-lead-pr-{0}', github.event.pull_request.number) ||
      github.event_name == 'pull_request_review'         && format('dev-lead-pr-{0}', github.event.pull_request.number) ||
      github.event_name == 'pull_request_review_comment' && format('dev-lead-pr-{0}', github.event.pull_request.number) ||
      github.event_name == 'issue_comment'               && format('dev-lead-issue-{0}', github.event.issue.number) ||
      github.event_name == 'issues'                      && format('dev-lead-issue-{0}', github.event.issue.number) ||
      'dev-lead'
    }}
  cancel-in-progress: false

jobs:
  dev-lead:
    uses: petry-projects/.github-private/.github/workflows/dev-lead-reusable.yml@main
    secrets: inherit
    permissions:
      contents: write
      pull-requests: write
      issues: write
      actions: read
      checks: read
