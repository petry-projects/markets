version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: markets
      POSTGRES_PASSWORD: markets_dev
      POSTGRES_DB: markets_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U markets -d markets_dev"]
      interval: 3s
      timeout: 3s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command: >
      -path=/migrations
      -database=postgres://markets:markets_dev@postgres:5432/markets_dev?sslmode=disable
      up
    # Runs once and exits — applies all pending migrations

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://markets:markets_dev@postgres:5432/markets_dev?sslmode=disable"
      ENVIRONMENT: "development"
      # FIREBASE_CREDENTIALS: optional — leave empty for dev without Firebase
    ports:
      - "8080:8080"

volumes:
  pgdata:
