name: PR Review — Mention Trigger

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [review_requested]

permissions: {}

jobs:
  pr-review-mention:
    permissions:
      pull-requests: write
    uses: petry-projects/.github/.github/workflows/pr-review-mention-reusable.yml@v2
    secrets: inherit

