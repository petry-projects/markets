services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: markets
      POSTGRES_PASSWORD: markets_dev
      POSTGRES_DB: markets_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U markets -d markets_dev"]
      interval: 3s
      timeout: 3s
      retries: 10

  firebase:
    image: andreysenov/firebase-tools:latest
    ports:
      - "9099:9099"   # Auth Emulator
      - "9199:9199"   # Realtime Database Emulator
      - "4000:4000"   # Emulator Suite UI
    volumes:
      - ./firebase.json:/home/node/firebase.json
      - firebase-data:/home/node/.firebase
    command: firebase emulators:start --only auth,database --project markets-dev
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9099/ || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: migrate/migrate:v4.17.0
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./migrations:/migrations
    command: >
      -path=/migrations
      -database=postgres://markets:markets_dev@postgres:5432/markets_dev?sslmode=disable
      up

  api:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      migrate:
        condition: service_completed_successfully
      firebase:
        condition: service_healthy
    environment:
      PORT: "8080"
      DATABASE_URL: "postgres://markets:markets_dev@postgres:5432/markets_dev?sslmode=disable"
      ENVIRONMENT: "development"
      FIREBASE_AUTH_EMULATOR_HOST: "firebase:9099"
      FIREBASE_DATABASE_EMULATOR_HOST: "firebase:9199"
    ports:
      - "8080:8080"

volumes:
  pgdata:
  firebase-data:
